name: Sync upstream markitdown

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-upstream.yml
      - .github/sync-trigger.txt

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone upstream repository
        run: |
          rm -rf /tmp/markitdown-upstream
          git clone --depth 1 https://github.com/microsoft/markitdown.git /tmp/markitdown-upstream

      - name: Copy upstream files without touching workflow permissions
        run: |
          shopt -s dotglob
          for item in * .*; do
            case "$item" in
              .|..|.git|.github) continue ;;
              *) rm -rf "$item" ;;
            esac
          done
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            /tmp/markitdown-upstream/ ./

      - name: Commit and push synchronized files
        run: |
          git add -A
          git commit -m "Sync source files from microsoft/markitdown" || echo "No changes to commit"
          git push origin main
